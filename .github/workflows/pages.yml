# Deploy static site to GitHub Pages.
#
# PRIVATE REPOS (free GitHub accounts):
#   GitHub Pages is NOT available for private repos unless you upgrade (Pro/Team/Enterprise).
#   Either make this repo PUBLIC (Settings → General → Danger zone → Change repository visibility),
#   or deploy elsewhere (Netlify, Cloudflare Pages, Vercel) for free with a private repo.
#
# FIRST-TIME SETUP (public repo — fixes configure-pages "Not Found"):
# 1. Push this workflow to your default branch (usually `main`).
# 2. Open the repo on GitHub → Settings → Pages.
# 3. Under "Build and deployment" → "Source", choose "GitHub Actions"
#    (NOT "Deploy from a branch"). Save if prompted.
# 4. Re-run this workflow: Actions → "Deploy GitHub Pages" → "Re-run all jobs".
#
# Docs: https://docs.github.com/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#publishing-with-a-custom-github-actions-workflow
#
# Optional: `configure-pages` supports `enablement: true` with a PAT (not GITHUB_TOKEN)
# if you need to enable Pages via API — see action README on actions/configure-pages.

name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Publish only static assets (avoid shipping .git or repo metadata).
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html styles.css script.js favicon.svg .nojekyll _site/
          if [ -f ppicture.jpg ]; then cp ppicture.jpg _site/; fi
          if [ -f picture.jpg ]; then cp picture.jpg _site/; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
